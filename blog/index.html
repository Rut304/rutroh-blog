<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — RutRoh</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --text: #e0e0e8;
            --text-muted: #8888a0;
            --accent: #6c5ce7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        nav {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        nav img { height: 28px; }
        nav a { color: var(--text-muted); font-size: 0.85rem; }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 { font-size: 1.4rem; margin-bottom: 24px; }
        .post-list { list-style: none; }
        .post-list li {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .post-list li:hover { border-color: var(--accent); }
        .post-list h3 { font-size: 1rem; margin-bottom: 6px; }
        .post-list .date { font-size: 0.8rem; color: var(--text-muted); }
        .post-list p { font-size: 0.9rem; color: var(--text-muted); margin-top: 8px; }
    </style>
</head>
<body>
    <nav>
        <a href="/"><img src="../assets/rutroh_long_logo.png" alt="RutRoh"></a>
        <a href="/">Home</a>
        <a href="/blog/">Blog</a>
    </nav>
    <div class="container">
        <h1>Blog</h1>
        <ul class="post-list">
            <li>
                <a href="ai-tools-2026.html">
                    <h3>Best AI Tools for 2026: The Ultimate Guide</h3>
                    <span class="date">February 28, 2026</span>
                    <p>Our tested and reviewed guide to the best AI tools for productivity, coding, and creative work in 2026.</p>
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
